name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
        cache: 'npm'
    
    - run: npm ci

    - name: Run type check
      run: |
        npx tsc --noEmit -p apps/web-api/tsconfig.json
        npx tsc --noEmit -p apps/worker/tsconfig.json
        npx tsc --noEmit -p apps/mobile/tsconfig.json

    - name: Run unit tests
      run: npx vitest run

    - name: Build Web API
      run: npm run build --workspace=apps/web-api
    
    - name: Build Worker
      run: npm run build --workspace=apps/worker
